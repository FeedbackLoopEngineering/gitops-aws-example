name: Build and dispatch

on:
  push:
    branches:
      - main

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DEPLOY_APP_ID }}
          private-key: ${{ secrets.DEPLOY_APP_PRIVATE_KEY }}
          owner: FeedbackLoopEngineering
          repositories: gitops-manifest-example

      - name: Dispatch to manifest repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: FeedbackLoopEngineering/gitops-manifest-example
          event-type: new-tag
          client-payload: |-
            {
              "tag": "${{ github.sha }}",
              "type": "aws-example",
              "project": "gitops-aws-example",
              "pr_number": "",
              "pr_url": ""
            }
